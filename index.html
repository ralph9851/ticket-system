<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>IT Helpdesk System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
@import url('https://fonts.googleapis.com/icon?family=Material+Icons+Round');

:root {
  /* Swedish Blue Theme */
  --bg-dark: #00172e;
  --glass-bg: rgba(0, 51, 102, 0.4);
  --glass-hover: rgba(0, 68, 136, 0.6);
  --border-light: rgba(255, 255, 255, 0.15);
  --border-focus: rgba(255, 205, 0, 0.5); 
  
  --text-main: #f8fafc;
  --text-sec: #cbd5e1;
  --text-muted: #94a3b8;

  --primary: #005293; 
  --primary-hover: #00427a;
  --accent-yellow: #FFCD00; 
  
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;

  --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
  --glow: 0 0 20px rgba(0, 82, 147, 0.4);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Prompt', sans-serif;
  background-color: var(--bg-dark);
  background-image: 
    radial-gradient(at 0% 0%, #002244 0px, transparent 50%),
    radial-gradient(at 100% 0%, #004080 0px, transparent 50%),
    radial-gradient(at 100% 100%, #001a33 0px, transparent 50%),
    radial-gradient(at 0% 100%, #003366 0px, transparent 50%);
  background-attachment: fixed;
  color: var(--text-main);
  min-height: 100vh;
  line-height: 1.6;
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

header {
  padding: 3rem 1rem 1.5rem;
  text-align: center;
  position: relative;
  animation: fadeInDown 0.8s ease;
}

header h1 {
  font-size: 2.75rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  background: linear-gradient(to right, #93c5fd, #ffffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header h1 i {
  color: var(--accent-yellow); 
  -webkit-text-fill-color: initial;
  font-size: 2.5rem;
  text-shadow: 0 0 15px rgba(255, 205, 0, 0.3);
}

header p {
  color: var(--text-sec);
  font-size: 1.1rem;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1.5rem 3rem;
}

/* ================== ส่วนของสถิติแบบซ่อนได้ ================== */
.stats-toggle-container {
  text-align: center;
  margin-bottom: 2rem;
  animation: fadeInDown 0.8s ease 0.2s both;
}

.stats-toggle-btn {
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-light);
  color: var(--text-sec);
  padding: 0.5rem 1.5rem;
  border-radius: 50px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.95rem;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  transition: all 0.3s ease;
}

.stats-toggle-btn:hover {
  background: var(--glass-hover);
  color: var(--text-main);
  border-color: var(--border-focus);
  transform: translateY(-2px);
}

.stats-toggle-btn i.chevron {
  transition: transform 0.3s ease;
}

.stats-toggle-btn.active i.chevron {
  transform: rotate(180deg);
}

.stats-wrapper {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.5s cubic-bezier(0, 1, 0, 1), opacity 0.4s ease-in-out;
}

.stats-wrapper.show {
  max-height: 800px; 
  opacity: 1;
  transition: max-height 0.5s ease-in-out, opacity 0.5s ease-in-out 0.1s;
  margin-bottom: 2.5rem;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1.5rem;
  padding-top: 0.5rem;
}

.stat-card {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-light);
  border-radius: 20px;
  padding: 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.stat-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-lg);
  background: var(--glass-hover);
}

.stat-icon {
  width: 50px;
  height: 50px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
}

.stat-info h3 {
  font-size: 0.9rem;
  color: var(--text-sec);
  font-weight: 500;
}

.stat-number {
  font-size: 1.8rem;
  font-weight: 700;
  line-height: 1.2;
}

/* Main Grid */
.dashboard-grid {
  display: grid;
  grid-template-columns: 350px 1fr;
  gap: 2rem;
  animation: fadeInUp 0.8s ease 0.4s both; 
}

.card {
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border-light);
  border-radius: 24px;
  padding: 2rem;
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column; /* ให้เนื้อหาเรียงลงมา */
}

.card h2 {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-main);
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border-light);
}

.sticky-form-container {
  height: fit-content;
  position: sticky;
  top: 2rem;
}

/* Form Styles */
.form-group {
  margin-bottom: 1.25rem;
}

label {
  display: block;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-sec);
  margin-bottom: 0.5rem;
}

input, select, textarea {
  width: 100%;
  padding: 0.875rem 1rem;
  border-radius: 12px;
  background: rgba(0, 20, 40, 0.5); 
  border: 1px solid var(--border-light);
  color: var(--text-main);
  font-size: 0.95rem;
  font-family: inherit;
  transition: all 0.3s ease;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--border-focus);
  background: rgba(0, 30, 60, 0.8);
  box-shadow: 0 0 0 3px rgba(255, 205, 0, 0.15);
}

select option {
  background-color: #003366; 
  color: #ffffff; 
}

button[type="submit"] {
  width: 100%;
  padding: 1rem;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  font-size: 1rem;
  background: linear-gradient(135deg, var(--primary), var(--primary-hover));
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  transition: all 0.3s ease;
  margin-top: 1rem;
}

button[type="submit"]:hover {
  transform: translateY(-2px);
  box-shadow: var(--glow);
}

/* =========================================
   ดีไซน์ใหม่: Timeline Tickets Section 
   ========================================= */
.tickets-container {
  overflow-y: visible; /* เอา Scroll ด้านในออกตามที่เคยปรับ */
  padding-right: 1rem;
  padding-left: 1.5rem; 
  position: relative;
}

.tickets-container::before {
  content: '';
  position: absolute;
  top: 10px;
  bottom: 0;
  left: 6px; 
  width: 2px;
  background: var(--border-light);
  border-radius: 2px;
  z-index: 0;
}

.ticket {
  position: relative;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border-light);
  border-radius: 16px;
  padding: 1.25rem;
  margin-bottom: 1.5rem;
  transition: all 0.3s ease;
  animation: slideIn 0.4s ease;
  z-index: 1;
}

.ticket:hover {
  background: rgba(255, 255, 255, 0.06);
  border-color: rgba(255, 255, 255, 0.2);
  transform: translateX(5px);
}

.ticket::before {
  content: '';
  position: absolute;
  top: 1.5rem;
  left: -1.5rem; 
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--bg-dark);
  border: 3px solid #cbd5e1;
  transform: translateX(-50%);
  z-index: 2;
  transition: all 0.3s ease;
}

.ticket[data-status="open"]::before {
  border-color: var(--danger);
  box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
  animation: pulse-danger 2s infinite;
}
.ticket[data-status="progress"]::before {
  border-color: var(--warning);
  box-shadow: 0 0 10px rgba(245, 158, 11, 0.6);
  animation: pulse-warning 2s infinite;
}
.ticket[data-status="done"]::before {
  border-color: var(--success);
  box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
}

.ticket-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.75rem;
}

.ticket-title-wrapper {
  display: flex;
  flex-direction: column;
}

.ticket-category {
  font-weight: 600;
  color: var(--text-main);
  font-size: 1.05rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.ticket-id {
  color: var(--text-muted);
  font-size: 0.75rem;
  font-family: monospace;
  margin-top: 0.2rem;
}

.ticket-desc {
  color: var(--text-sec);
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 1rem;
  background: rgba(0, 0, 0, 0.15);
  padding: 0.75rem 1rem;
  border-radius: 8px;
  border-left: 3px solid transparent;
}

.ticket[data-status="open"] .ticket-desc { border-left-color: var(--danger); }
.ticket[data-status="progress"] .ticket-desc { border-left-color: var(--warning); }
.ticket[data-status="done"] .ticket-desc { border-left-color: var(--success); }

.ticket-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}

.ticket-meta {
  font-size: 0.8rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 1.25rem;
}

.ticket-meta span {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.ticket-meta i {
  font-size: 1.1rem;
}

.status-select {
  padding: 0.4rem 0.75rem;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  appearance: none; 
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 0.5rem center;
  background-size: 1em;
  padding-right: 2rem;
}

.status-open-bg { background-color: rgba(239,68,68,0.15); color: #fca5a5; }
.status-progress-bg { background-color: rgba(245,158,11,0.15); color: #fcd34d; }
.status-done-bg { background-color: rgba(16,185,129,0.15); color: #6ee7b7; }

/* =========================================
   ปุ่มแสดงเพิ่มเติม (Load More) 
   ========================================= */
.load-more-container {
  text-align: center;
  margin-top: 1rem;
  padding-top: 1rem;
}

.load-more-btn {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border-light);
  color: var(--text-sec);
  padding: 0.6rem 1.5rem;
  border-radius: 50px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.9rem;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  transition: all 0.3s ease;
}

.load-more-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text-main);
  border-color: var(--border-focus);
}

.empty-state {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.empty-state i {
  font-size: 4rem;
  margin-bottom: 1rem;
  background: linear-gradient(to bottom, var(--text-muted), transparent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Animations */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse-danger {
  0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
  70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
  100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}

@keyframes pulse-warning {
  0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
  70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
  100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
}

/* Responsive */
@media (max-width: 900px) {
  .dashboard-grid { 
    grid-template-columns: 1fr; 
    gap: 1.5rem;
  }
  
  .sticky-form-container {
    position: static;
    height: auto;
  }

  .tickets-container::before {
    left: 2px;
  }
  
  .ticket {
    padding: 1rem;
    margin-left: -0.5rem; 
  }

  .ticket::before {
    left: -1rem; 
  }

  .ticket:hover {
    transform: none; 
  }
  
  header {
    padding: 2rem 1rem 1rem;
  }
  header h1 {
    font-size: 2rem;
  }
}

/* Toast Notification */
#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--success);
  color: white;
  padding: 1rem 1.5rem;
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  z-index: 1000;
}

#toast.show {
  transform: translateY(0);
  opacity: 1;
}
</style>
</head>

<body>

<header>
  <h1><i class="material-icons-round">support_agent</i> IT Service Desk</h1>
  <p>ระบบแจ้งซ่อมและร้องขอรับบริการด้านไอที</p>
</header>

<div class="container">

  <div class="stats-toggle-container">
    <button id="toggleStatsBtn" class="stats-toggle-btn">
      <i class="material-icons-round">analytics</i> 
      <span id="toggleText">แสดงสถิติภาพรวม</span> 
      <i class="material-icons-round chevron">expand_more</i>
    </button>
  </div>
  
  <div id="statsWrapper" class="stats-wrapper">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background: rgba(255, 205, 0, 0.2); color: var(--accent-yellow);">
          <i class="material-icons-round">analytics</i>
        </div>
        <div class="stat-info">
          <h3>คำขอทั้งหมด</h3>
          <div class="stat-number" id="totalTickets">0</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: rgba(239, 68, 68, 0.2); color: #fca5a5;">
          <i class="material-icons-round">new_releases</i>
        </div>
        <div class="stat-info">
          <h3>รอการแก้ไข</h3>
          <div class="stat-number" id="openTickets" style="color: #fca5a5;">0</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: rgba(245, 158, 11, 0.2); color: #fcd34d;">
          <i class="material-icons-round">autorenew</i>
        </div>
        <div class="stat-info">
          <h3>กำลังดำเนินการ</h3>
          <div class="stat-number" id="progressTickets" style="color: #fcd34d;">0</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: rgba(16, 185, 129, 0.2); color: #6ee7b7;">
          <i class="material-icons-round">task_alt</i>
        </div>
        <div class="stat-info">
          <h3>เสร็จสิ้นแล้ว</h3>
          <div class="stat-number" id="doneTickets" style="color: #6ee7b7;">0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="card sticky-form-container">
      <h2><i class="material-icons-round">add_circle_outline</i> แจ้งปัญหาใหม่</h2>
      <form id="ticketForm">
        <div class="form-group">
          <label>ชื่อผู้แจ้ง และ แผนก</label>
          <input id="reporter" placeholder="ระบุชื่อผู้แจ้งและแผนก เช่น พี่วิ กองคลัง" required>
        </div>

        <div class="form-group">
          <label>ประเภทปัญหา</label>
          <select id="category" required>
            <option value="" disabled selected>-- กรุณาเลือกประเภท --</option>
            <option value="hardware">🖥️ ปัญหาฮาร์ดแวร์ / อุปกรณ์</option>
            <option value="software">💻 ปัญหาซอฟต์แวร์ / โปรแกรม</option>
            <option value="network">🌐 อินเทอร์เน็ต / เครือข่าย</option>
            <option value="printer">🖨️ เครื่องพิมพ์ / สแกนเนอร์</option>
            <option value="account">👤 บัญชีผู้ใช้ / รหัสผ่าน</option>
            <option value="other">❓ อื่นๆ</option>
          </select>
        </div>

        <div class="form-group">
          <label>รายละเอียดปัญหา</label>
          <textarea id="problem" rows="4" placeholder="อธิบายอาการที่พบให้ชัดเจน เพื่อความรวดเร็วในการแก้ไข..." required></textarea>
        </div>

        <button type="submit" id="submitBtn">
          <i class="material-icons-round">send</i> ส่งคำขอรับบริการ
        </button>
      </form>
    </div>

    <div class="card">
      <h2><i class="material-icons-round">history</i> ไทม์ไลน์แจ้งปัญหาล่าสุด</h2>
      <div id="ticketList" class="tickets-container">
        </div>
      
      <div id="loadMoreContainer" class="load-more-container" style="display: none;">
        <button id="loadMoreBtn" class="load-more-btn">
          แสดงเพิ่มเติม <i class="material-icons-round">expand_more</i>
        </button>
      </div>

    </div>

  </div>
</div>

<div id="toast"><i class="material-icons-round">check_circle</i> <span>บันทึกข้อมูลสำเร็จ!</span></div>

<script>
const form = document.getElementById("ticketForm");
const submitBtn = document.getElementById("submitBtn");
const reporterInput = document.getElementById("reporter");
const categorySelect = document.getElementById("category");
const problemInput = document.getElementById("problem");
const ticketList = document.getElementById("ticketList");
const toast = document.getElementById("toast");
const loadMoreBtn = document.getElementById("loadMoreBtn");
const loadMoreContainer = document.getElementById("loadMoreContainer");

// Toggle Stats Panel
const toggleStatsBtn = document.getElementById("toggleStatsBtn");
const statsWrapper = document.getElementById("statsWrapper");
const toggleText = document.getElementById("toggleText");

// ค่าเริ่มต้นให้โชว์แค่ 5 รายการ
let visibleCount = 5;

toggleStatsBtn.addEventListener("click", () => {
  statsWrapper.classList.toggle("show");
  toggleStatsBtn.classList.toggle("active");
  
  if(statsWrapper.classList.contains("show")) {
    toggleText.textContent = "ซ่อนสถิติภาพรวม";
  } else {
    toggleText.textContent = "แสดงสถิติภาพรวม";
  }
});

let tickets = JSON.parse(localStorage.getItem("it_tickets_v3")) || [];
let nextId = tickets.length > 0 ? Math.max(...tickets.map(t => t.id)) + 1 : 1;

const categoryMap = {
  hardware: 'ฮาร์ดแวร์ / อุปกรณ์',
  software: 'ซอฟต์แวร์ / โปรแกรม',
  network: 'อินเทอร์เน็ต / เครือข่าย',
  printer: 'เครื่องพิมพ์',
  account: 'บัญชีผู้ใช้',
  other: 'อื่นๆ'
};

const getStatusClass = (status) => {
  if(status === 'open') return 'status-open-bg';
  if(status === 'progress') return 'status-progress-bg';
  return 'status-done-bg';
};

function updateStats() {
  document.getElementById("totalTickets").textContent = tickets.length;
  document.getElementById("openTickets").textContent = tickets.filter(t => t.status === 'open').length;
  document.getElementById("progressTickets").textContent = tickets.filter(t => t.status === 'progress').length;
  document.getElementById("doneTickets").textContent = tickets.filter(t => t.status === 'done').length;
}

function showToast(message, isError = false) {
  toast.querySelector('span').textContent = message;
  toast.style.background = isError ? 'var(--danger)' : 'var(--success)';
  toast.querySelector('i').textContent = isError ? 'error' : 'check_circle';
  
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function renderTickets() {
  if (tickets.length === 0) {
    ticketList.innerHTML = `
      <div class="empty-state">
        <i class="material-icons-round">inbox</i>
        <h3>ยังไม่มีรายการแจ้งซ่อม</h3>
        <p>ระบบพร้อมให้บริการแล้ว สร้างรายการแรกของคุณได้เลย</p>
      </div>
    `;
    loadMoreContainer.style.display = "none";
    updateStats();
    return;
  }

  // หั่นอาร์เรย์มาแสดงตามจำนวน visibleCount
  const ticketsToShow = tickets.slice(0, visibleCount);

  ticketList.innerHTML = ticketsToShow.map(ticket => {
    const categoryName = categoryMap[ticket.category] || ticket.category;
    const statusClass = getStatusClass(ticket.status);
    
    return `
      <div class="ticket" data-status="${ticket.status}">
        <div class="ticket-header">
          <div class="ticket-title-wrapper">
            <span class="ticket-category">${categoryName}</span>
            <span class="ticket-id">#TKT-${String(ticket.id).padStart(4, '0')}</span>
          </div>
        </div>
        <div class="ticket-desc">
          ${ticket.problem}
        </div>
        <div class="ticket-footer">
          <div class="ticket-meta">
            <span><i class="material-icons-round">account_circle</i> ${ticket.reporter}</span>
            <span><i class="material-icons-round">schedule</i> ${new Date(ticket.createdAt).toLocaleDateString('th-TH', { 
              day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' 
            })}</span>
          </div>
          <select class="status-select ${statusClass}" onchange="updateStatus(${ticket.id}, this.value, this)">
            <option value="open" ${ticket.status === 'open' ? 'selected' : ''}>รอการแก้ไข</option>
            <option value="progress" ${ticket.status === 'progress' ? 'selected' : ''}>กำลังดำเนินการ</option>
            <option value="done" ${ticket.status === 'done' ? 'selected' : ''}>เสร็จสิ้น</option>
          </select>
        </div>
      </div>
    `;
  }).join('');

  // เช็คว่ามีรายการเหลือให้กด "แสดงเพิ่มเติม" อีกไหม
  if (tickets.length > visibleCount) {
    loadMoreContainer.style.display = "block";
  } else {
    loadMoreContainer.style.display = "none";
  }

  updateStats();
}

// เมื่อกดปุ่มแสดงเพิ่มเติม ให้เพิ่มโควต้าการแสดงผลทีละ 5 รายการ
loadMoreBtn.addEventListener("click", () => {
  visibleCount += 5;
  renderTickets();
});

function updateStatus(id, status, selectElement) {
  const ticket = tickets.find(t => t.id === id);
  if (ticket) {
    ticket.status = status;
    ticket.updatedAt = Date.now();
    localStorage.setItem("it_tickets_v3", JSON.stringify(tickets));
    
    selectElement.closest('.ticket').setAttribute('data-status', status);
    selectElement.className = `status-select ${getStatusClass(status)}`;
    
    updateStats();
  }
}

form.onsubmit = async (e) => {
  e.preventDefault();
  
  const originalBtnText = submitBtn.innerHTML;
  submitBtn.innerHTML = `<i class="material-icons-round">sync</i> กำลังส่งข้อมูล...`;
  submitBtn.disabled = true;
  
  const ticket = {
    id: nextId++,
    reporter: reporterInput.value.trim(),
    category: categorySelect.value,
    problem: problemInput.value.trim(),
    status: 'open',
    createdAt: Date.now(),
    updatedAt: Date.now()
  };

  tickets.unshift(ticket);
  localStorage.setItem("it_tickets_v3", JSON.stringify(tickets));
  
  // รีเซ็ตการแสดงผลกลับมาเป็น 5 รายการแรกทุกครั้งที่มีการแจ้งปัญหาใหม่
  visibleCount = 5; 
  renderTickets();
  
  try {
    const formData = new URLSearchParams({
      reporter: ticket.reporter,
      category: categoryMap[ticket.category] || ticket.category,
      problem: ticket.problem,
      ticket_id: ticket.id
    });
    
    /* await fetch("URL_GOOGLE_APPS_SCRIPT_ของคุณ", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: formData
    });
    */
    showToast("ส่งคำขอรับบริการเรียบร้อยแล้ว!");
  } catch (err) {
    showToast("บันทึกสำเร็จ แต่การส่งข้อมูลผิดพลาดบางส่วน", true);
    console.error(err);
  } finally {
    submitBtn.innerHTML = originalBtnText;
    submitBtn.disabled = false;
    form.reset();
    
    if(window.innerWidth > 900) {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }
};

renderTickets();

</script>
